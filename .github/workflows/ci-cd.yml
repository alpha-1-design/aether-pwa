name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Lint Python
        run: |
          pip install ruff
          ruff check api/server.py --exit-zero

  lint:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify HTML syntax
        run: |
          python3 -c "from html.parser import HTMLParser; HTMLParser().feed(open('index.html').read())"
          echo "HTML syntax OK"
      
      - name: Verify JavaScript syntax
        run: |
          for f in js/*.js; do
            node --check "$f" 2>/dev/null || echo "Syntax check skipped: $f"
          done
      
      - name: Check required files
        run: |
          echo "Checking required files..."
          ls -la index.html
          ls -la js/
          ls -la styles/
          ls -la api/server.py
          ls -la manifest.json
          ls -la package.json

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Deploy to Vercel
        run: |
          npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}