<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="Aether - Your AI Assistant">
    <title>Aether</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/theme.css">
    <link rel="stylesheet" href="/styles/anim.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%236366f1'/%3E%3Ccircle cx='50' cy='50' r='25' fill='none' stroke='%23a1a1aa' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='15' fill='none' stroke='%236366f1' stroke-width='3' opacity='0.6'/%3E%3C/svg%3E">
</head>
<body>
    <div id="app" class="app-container">
        <header class="app-header">
            <div class="header-logo">
                <svg class="header-atom" viewBox="0 0 200 200" width="32" height="32">
                    <defs>
                        <radialGradient id="hNucGrad" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#fff"/>
                            <stop offset="50%" stop-color="#818cf8"/>
                            <stop offset="100%" stop-color="#4f46e5"/>
                        </radialGradient>
                        <radialGradient id="hElecGrad" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#fff"/>
                            <stop offset="50%" stop-color="#22d3ee"/>
                            <stop offset="100%" stop-color="#0891b2"/>
                        </radialGradient>
                    </defs>
                    <ellipse cx="100" cy="100" rx="80" ry="25" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
                    <ellipse cx="100" cy="100" rx="80" ry="25" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.3" transform="rotate(60 100 100)"/>
                    <ellipse cx="100" cy="100" rx="80" ry="25" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4" transform="rotate(120 100 100)"/>
                    <circle cx="180" cy="100" r="6" fill="url(#hElecGrad)"/>
                    <circle cx="48" cy="100" r="6" fill="url(#hElecGrad)"/>
                    <circle cx="100" cy="160" r="6" fill="url(#hElecGrad)" transform="rotate(60 100 100)"/>
                    <circle cx="159" cy="49" r="6" fill="url(#hElecGrad)" transform="rotate(120 100 100)"/>
                    <circle cx="100" cy="100" r="16" fill="url(#hNucGrad)"/>
                </svg>
                <span class="header-title">Aether</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="headerMenu" title="Menu">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
                    </svg>
                </button>
            </div>
        </header>

        <main class="app-main">
            <div id="chatView" class="view active">
                <div class="chat-header">
                    <div class="persona-selector">
                        <select id="personaSelect">
                            <option value="default">Default</option>
                        </select>
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </div>
                </div>
                <div id="messages" class="messages-container">
                    <div class="empty-state">
                        <svg class="empty-icon" viewBox="0 0 200 200" width="80" height="80">
                            <defs>
                                <radialGradient id="eNucGrad" cx="30%" cy="30%" r="70%">
                                    <stop offset="0%" stop-color="#fff"/>
                                    <stop offset="50%" stop-color="#818cf8"/>
                                    <stop offset="100%" stop-color="#4f46e5"/>
                                </radialGradient>
                                <radialGradient id="eElecGrad" cx="30%" cy="30%" r="70%">
                                    <stop offset="0%" stop-color="#fff"/>
                                    <stop offset="50%" stop-color="#22d3ee"/>
                                    <stop offset="100%" stop-color="#0891b2"/>
                                </radialGradient>
                            </defs>
                            <ellipse cx="100" cy="100" rx="80" ry="25" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
                            <ellipse cx="100" cy="100" rx="80" ry="25" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.3" transform="rotate(60 100 100)"/>
                            <ellipse cx="100" cy="100" rx="80" ry="25" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4" transform="rotate(120 100 100)"/>
                            <circle cx="180" cy="100" r="6" fill="url(#eElecGrad)"/>
                            <circle cx="48" cy="100" r="6" fill="url(#eElecGrad)"/>
                            <circle cx="100" cy="160" r="6" fill="url(#eElecGrad)" transform="rotate(60 100 100)"/>
                            <circle cx="159" cy="49" r="6" fill="url(#eElecGrad)" transform="rotate(120 100 100)"/>
                            <circle cx="100" cy="100" r="16" fill="url(#eNucGrad)"/>
                        </svg>
                        <h2>Start a conversation</h2>
                        <p>Type a message to begin</p>
                    </div>
                </div>
                <div class="typing-indicator hidden" id="typingIndicator">
                    <div class="typing-content">
                        <svg class="typing-atom" viewBox="0 0 100 100" width="24" height="24">
                            <circle cx="50" cy="50" r="16" fill="#6366f1"/>
                            <ellipse class="atom-ring atom-ring-1" cx="50" cy="50" rx="38" ry="16" fill="none" stroke="#a1a1aa" stroke-width="3"/>
                            <ellipse class="atom-ring atom-ring-2" cx="50" cy="50" rx="38" ry="16" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.7"/>
                        </svg>
                        <div class="typing-dots">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
                <div class="input-container">
                    <div class="input-actions">
                        <button class="icon-btn" id="attachBtn" title="Attach file">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.17 9.17a6 6 0 01-8.49-8.49l8.49-8.49a4 4 0 015.66 5.66l-8.49 8.49a2 2 0 01-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>
                        <button class="icon-btn" id="voiceBtn" title="Voice input">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                                <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                                <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
                            </svg>
                        </button>
                        <button class="icon-btn" id="searchBtn" title="Web search">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                        </button>
                    </div>
                    <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <div class="drop-zone hidden" id="dropZone">
                    <p>Drop files here</p>
                </div>
            </div>

            <div id="agentsView" class="view">
                <div class="agents-header">
                    <h2>Your Agents</h2>
                    <button class="icon-btn" id="createAgentBtn" title="Create agent">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
                <div id="agentsList" class="agents-list">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <h3>No agents yet</h3>
                        <p>Create a custom agent to chat with</p>
                        <button class="primary-btn" id="emptyCreateAgentBtn">Create Agent</button>
                    </div>
                </div>
            </div>

            <div id="settingsView" class="view">
                <div class="settings-container">
                    <h2>Settings</h2>
                    
                    <div class="settings-section" data-section="api-keys">
                        <button class="section-header">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                            </svg>
                            <span>API Keys</span>
                            <svg class="chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                        <div class="section-content hidden">
                            <div class="api-key-form">
                                <div class="form-group">
                                    <label>Provider</label>
                                    <select id="apiProviderSelect">
                                        <option value="openrouter">OpenRouter</option>
                                        <option value="groq">Groq</option>
                                        <option value="cerebras">Cerebras</option>
                                        <option value="google">Google Gemini</option>
                                        <option value="opencode">OpenCode Zen</option>
                                        <option value="huggingface">HuggingFace</option>
                                        <option value="cohere">Cohere</option>
                                        <option value="github">GitHub Models</option>
                                        <option value="cloudflare">Cloudflare Workers</option>
                                        <option value="mistral">Mistral AI</option>
                                        <option value="openai">OpenAI</option>
                                        <option value="anthropic">Anthropic</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>API Key</label>
                                    <input type="password" id="apiKeyInput" placeholder="Enter your API key">
                                </div>
                                <button class="primary-btn" id="saveApiKeyBtn">Save Key</button>
                                <button class="text-btn" id="getKeyLinkBtn">Get API Key →</button>
                            </div>
                            <div class="saved-keys" id="savedKeys"></div>
                        </div>
                    </div>

                    <div class="settings-section" data-section="models">
                        <button class="section-header">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2a10 10 0 100 20 10 10 0 000-20z"/><path d="M12 6v6l4 2"/>
                            </svg>
                            <span>Models & Settings</span>
                            <svg class="chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                        <div class="section-content hidden">
                            <div class="form-group">
                                <label>Default Model</label>
                                <select id="defaultModelSelect"></select>
                            </div>
                            <div class="toggle-group">
                                <label class="toggle-label">
                                    <span>Streaming Response</span>
                                    <input type="checkbox" id="streamingToggle" checked>
                                    <span class="toggle-switch"></span>
                                </label>
                            </div>
                            <div class="toggle-group">
                                <label class="toggle-label">
                                    <span>Execute Code Automatically</span>
                                    <input type="checkbox" id="executeToggle">
                                    <span class="toggle-switch"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="settings-section" data-section="appearance">
                        <button class="section-header">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                            </svg>
                            <span>Appearance</span>
                            <svg class="chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                        <div class="section-content hidden">
                            <div class="form-group">
                                <label>Theme</label>
                                <div class="theme-options">
                                    <button class="theme-btn active" data-theme="space-dark">
                                        <span class="theme-preview dark"></span>
                                        <span>Space Dark</span>
                                    </button>
                                    <button class="theme-btn" data-theme="light">
                                        <span class="theme-preview light"></span>
                                        <span>Light</span>
                                    </button>
                                    <button class="theme-btn" data-theme="glass">
                                        <span class="theme-preview glass"></span>
                                        <span>Glass</span>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Font Size</label>
                                <input type="range" id="fontSizeSlider" min="14" max="20" value="16">
                                <span id="fontSizeValue">16px</span>
                            </div>
                        </div>
                    </div>

                    <div class="settings-section" data-section="voice">
                        <button class="section-header">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                                <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                            </svg>
                            <span>Voice & Input</span>
                            <svg class="chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                        <div class="section-content hidden">
                            <div class="toggle-group">
                                <label class="toggle-label">
                                    <span>Speech-to-Text</span>
                                    <input type="checkbox" id="speechToggle">
                                    <span class="toggle-switch"></span>
                                </label>
                            </div>
                            <div class="toggle-group">
                                <label class="toggle-label">
                                    <span>Voice Memo Recording</span>
                                    <input type="checkbox" id="voiceMemoToggle">
                                    <span class="toggle-switch"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="settings-section" data-section="cross-device">
                        <button class="section-header">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
                            </svg>
                            <span>Cross-Device</span>
                            <svg class="chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                        <div class="section-content hidden">
                            <div class="form-group">
                                <label>Mode</label>
                                <div class="mode-toggle">
                                    <button class="mode-btn active" data-mode="off">Off</button>
                                    <button class="mode-btn" data-mode="host">Host</button>
                                    <button class="mode-btn" data-mode="join">Join</button>
                                </div>
                            </div>
                            <div class="device-info hidden" id="hostInfo">
                                <p class="ip-display">Your IP: <span id="localIp">192.168.1.x</span></p>
                                <button class="primary-btn" id="showQrBtn">Show QR Code</button>
                                <div class="qr-container hidden" id="qrContainer"></div>
                            </div>
                            <div class="device-info hidden" id="joinInfo">
                                <div class="form-group">
                                    <label>Enter Host IP</label>
                                    <input type="text" id="hostIpInput" placeholder="192.168.1.x">
                                </div>
                                <button class="primary-btn" id="joinDeviceBtn">Connect</button>
                            </div>
                            <div class="connected-devices hidden" id="connectedDevices">
                                <h4>Connected Devices</h4>
                                <div id="devicesList"></div>
                            </div>
                            <div class="share-options hidden" id="shareOptions">
                                <h4>Share With Connected Devices</h4>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="shareSessions"> Sessions
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="shareMemory"> Memory
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="shareAgents"> Agents
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="settings-section" data-section="data">
                        <button class="section-header">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                            </svg>
                            <span>Data & Storage</span>
                            <svg class="chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                        <div class="section-content hidden">
                            <button class="danger-btn" id="clearHistoryBtn">Clear Chat History</button>
                            <button class="secondary-btn" id="exportMemoryBtn">Export Memory</button>
                            <button class="secondary-btn" id="importMemoryBtn">Import Memory</button>
                            <input type="file" id="importFileInput" accept=".json" hidden>
                        </div>
                    </div>

                    <div class="settings-section" data-section="about">
                        <button class="section-header">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
                            </svg>
                            <span>About</span>
                            <svg class="chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                        <div class="section-content hidden">
                            <p class="about-version">Aether Reborn v1.0.0</p>
                            <p class="about-credits">Your AI Assistant</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-view="chat">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                </svg>
                <span>Chat</span>
            </button>
            <button class="nav-btn" data-view="agents">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Agents</span>
            </button>
            <button class="nav-btn" data-view="settings">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                </svg>
                <span>Settings</span>
            </button>
        </nav>
    </div>

    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal" id="agentModal">
            <div class="modal-header">
                <h3>Create Agent</h3>
                <button class="icon-btn modal-close">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Agent Name</label>
                    <input type="text" id="agentNameInput" placeholder="e.g., Python Expert">
                </div>
                <div class="form-group">
                    <label>System Prompt</label>
                    <textarea id="agentPromptInput" rows="4" placeholder="Define how this agent should behave..."></textarea>
                </div>
                <div class="form-group">
                    <label>Knowledge (optional)</label>
                    <textarea id="agentKnowledgeInput" rows="3" placeholder="Any additional knowledge or context..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="secondary-btn modal-close">Cancel</button>
                <button class="primary-btn" id="saveAgentBtn">Save Agent</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js" type="module"></script>
</body>
</html>
